<!DOCTYPE html>
<html lang="en">

<head>  
  <meta charset="utf-8">  
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>IITM Math 1 Dashboard - Enhanced Student Analytics</title>
 
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem 0;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .icon-students { background: #e3f2fd; color: #1976d2; }
    .icon-average { background: #f3e5f5; color: #7b1fa2; }
    .icon-highest { background: #e8f5e8; color: #388e3c; }
    .icon-lowest { background: #fff3e0; color: #f57c00; }
    .table-container {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .score-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .score-excellent { background: #d4edda; color: #155724; }
    .score-good { background: #d1ecf1; color: #0c5460; }
    .score-average { background: #fff3cd; color: #856404; }
    .score-poor { background: #f8d7da; color: #721c24; }
    .student-row { cursor: pointer; transition: background-color 0.2s; }
    .student-row:hover { background-color: #f8f9fa; }
    .student-detail {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      margin-top: 0.5rem;
      border-radius: 8px;
    }
    .question-detail {
      background: white;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.5rem;
      border: 1px solid #e9ecef;
    }
    .expand-icon { transition: transform 0.3s; }
    .expand-icon.rotated { transform: rotate(90deg); }
    .pagination { margin-top: 1rem; }
    .pagination .page-link { cursor: pointer; }
    .time-badge { color: #6c757d; white-space: nowrap; }
    .scrollable-answers {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      background: white;
    }
    .attempt-badge {
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 12px;
      margin-left: 0.5rem;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <h1 class="mb-0"><i class="bi bi-graph-up me-2"></i>IITM Math 1 Dashboard</h1>
        <div>
          <button class="btn btn-light me-2" onclick="exportData()">
            <i class="bi bi-download me-1"></i>Export Data
          </button>
          <button class="btn btn-light" onclick="refreshData()">
            <i class="bi bi-arrow-clockwise me-1"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- Statistics Cards -->
    <div class="row stats-cards">
      <div class="col-md-3 mb-3">
        <div class="stat-card">
          <div class="stat-icon icon-students"><i class="bi bi-people"></i></div>
          <h3 class="mb-1" id="totalStudents">0</h3>
          <p class="text-muted mb-0">Total Students</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card">
          <div class="stat-icon icon-average"><i class="bi bi-bar-chart"></i></div>
          <h3 class="mb-1" id="averageScore">0%</h3>
          <p class="text-muted mb-0">Average Score</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card">
          <div class="stat-icon icon-highest"><i class="bi bi-trophy"></i></div>
          <h3 class="mb-1" id="highestScore">0%</h3>
          <p class="text-muted mb-0">Highest Score</p>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card">
          <div class="stat-icon icon-lowest"><i class="bi bi-exclamation-triangle"></i></div>
          <h3 class="mb-1" id="lowestScore">0%</h3>
          <p class="text-muted mb-0">Lowest Score</p>
        </div>
      </div>
    </div>

    <!-- Filters and Table -->
    <div class="table-container">
      <div class="row filter-row mb-3">
        <div class="col-md-3 mb-2">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" class="form-control" id="searchFilter" placeholder="Search by username...">
          </div>
        </div>
        <div class="col-md-2 mb-2">
          <select class="form-select" id="topicFilter">
            <option value="">All Topics</option>
          </select>
        </div>
        <div class="col-md-2 mb-2">
          <select class="form-select" id="scoreFilter">
            <option value="">All Scores</option>
            <option value="80-100">80-100%</option>
            <option value="60-79">60-79%</option>
            <option value="40-59">40-59%</option>
            <option value="1-39">1-39%</option>
            <option value="0">0%</option>
          </select>
        </div>
        <div class="col-md-2 mb-2">
          <input type="date" class="form-control" id="dateFilter">
        </div>
        <div class="col-md-3 mb-2">
          <button class="btn btn-primary" onclick="applyFilters()"><i class="bi bi-funnel me-1"></i>Filter</button>
          <button class="btn btn-outline-secondary ms-2" onclick="clearFilters()"><i class="bi bi-x-circle me-1"></i>Clear</button>
        </div>
      </div>

      <!-- Loading State -->
      <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Loading IITM Math 1 data...</p>
      </div>

      <!-- Table -->
      <div class="table-responsive" id="tableContainer" style="display: none;">
        <table class="table table-hover">
          <thead class="table-dark">
            <tr>
              <th width="30px"></th>
              <th><i class="bi bi-person me-1"></i>Username</th>
              <th><i class="bi bi-book me-1"></i>Topic</th>
              <th><i class="bi bi-award me-1"></i>Score</th>
              <th><i class="bi bi-percent me-1"></i>Percentage</th>
              <th><i class="bi bi-hash me-1"></i>Attempt</th>
              <th><i class="bi bi-stopwatch me-1"></i>Time Taken</th>
              <th><i class="bi bi-calendar me-1"></i>Date</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        
        <!-- Pagination Controls -->
        <div id="paginationControls" class="d-flex justify-content-between align-items-center mt-3">
          <div id="paginationInfo" class="text-muted"></div>
          <nav>
            <ul class="pagination mb-0" id="pagination"></ul>
          </nav>
        </div>
      </div>

      <!-- No Data State -->
      <div id="noDataState" class="text-center py-5" style="display: none;">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="mt-3 text-muted">No data found matching your filters</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let allData = [];
    let filteredData = [];
    let expandedRows = new Set();
    let currentPage = 1;
    let totalPages = 1;
    let totalUsers = 0;
    let isLoading = false;

    // Format time taken
    function formatTimeTaken(seconds) {
      if (seconds === null || seconds === undefined || seconds === 0) return '—';
      seconds = Math.round(seconds);
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    // Load data with pagination
    async function loadData(page = 1) {
      if (isLoading) return;
      isLoading = true;
      
      try {
        console.log(`📥 Fetching IITM Math scores - Page ${page}...`);
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        
        const response = await fetch(`https://sanghamitra-learnworld.vercel.app/api/iitmmath_scores?page=${page}&limit=20`, {
          method: 'GET',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const result = await response.json();
        console.log('📊 API Response:', result);
        
        if (result.success && result.data) {
          // Store pagination info
          if (result.pagination) {
            currentPage = result.pagination.currentPage;
            totalPages = result.pagination.totalPages;
            totalUsers = result.pagination.totalUsers;
          }
          
          // Process data
          allData = [];
          const studentTopicAttempts = {};
          
          result.data.forEach(student => {
            if (student.quizScores && student.quizScores.length > 0) {
              student.quizScores.forEach((quizScore, idx) => {
                const attemptKey = `${student.email}_${quizScore.topic}`;
                if (!studentTopicAttempts[attemptKey]) studentTopicAttempts[attemptKey] = 0;
                studentTopicAttempts[attemptKey]++;
                
                allData.push({
                  username: student.username,
                  email: student.email,
                  topic: quizScore.topic,
                  score: quizScore.score || 0,
                  totalQuestions: quizScore.totalQuestions,
                  correctAnswers: quizScore.score || 0,
                  percentage: parseFloat(quizScore.percentage || 0),
                  timestamp: quizScore.timestamp,
                  questionResults: quizScore.questionResults || [],
                  totalTimeTaken: quizScore.totalTimeTaken || null,
                  attemptNumber: studentTopicAttempts[attemptKey]
                });
              });
            }
          });
          
          filteredData = [...allData];
          console.log(`✅ Loaded ${allData.length} records`);
          
          calculateStatistics();
          populateTable();
          populateFilters();
          updatePaginationControls();
          showTable();
        } else {
          throw new Error('Invalid response format');
        }
        
      } catch (error) {
        console.error('❌ Error loading data:', error);
        document.getElementById('loadingState').innerHTML = `
          <div class="text-center py-5">
            <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
            <p class="mt-3 text-danger fw-bold">Failed to load data</p>
            <p class="text-muted">${error.message || 'Please check your connection and try again'}</p>
            <button class="btn btn-primary mt-3" onclick="refreshData()">
              <i class="bi bi-arrow-clockwise me-1"></i>Retry
            </button>
          </div>
        `;
      } finally {
        isLoading = false;
      }
    }

    // Update pagination controls
    function updatePaginationControls() {
      const paginationDiv = document.getElementById('pagination');
      const infoDiv = document.getElementById('paginationInfo');
      
      if (!paginationDiv) return;
      
      infoDiv.innerHTML = `Showing ${allData.length} of ${totalUsers} total users`;
      
      let html = '';
      // Previous button
      html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
        <a class="page-link" onclick="changePage(${currentPage - 1})">Previous</a>
      </li>`;
      
      // Page numbers
      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);
      
      for (let i = startPage; i <= endPage; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
          <a class="page-link" onclick="changePage(${i})">${i}</a>
        </li>`;
      }
      
      // Next button
      html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
        <a class="page-link" onclick="changePage(${currentPage + 1})">Next</a>
      </li>`;
      
      paginationDiv.innerHTML = html;
    }

    // Change page
    function changePage(page) {
      if (page < 1 || page > totalPages || page === currentPage) return;
      currentPage = page;
      loadData(currentPage);
    }

    // Calculate statistics
    function calculateStatistics() {
      if (filteredData.length === 0) {
        document.getElementById('totalStudents').textContent = '0';
        document.getElementById('averageScore').textContent = '0%';
        document.getElementById('highestScore').textContent = '0%';
        document.getElementById('lowestScore').textContent = '0%';
        return;
      }

      const uniqueStudents = new Set(filteredData.map(item => item.email)).size;
      const percentages = filteredData.map(item => parseFloat(item.percentage));
      const averageScore = percentages.length > 0 ? Math.round(percentages.reduce((a, b) => a + b, 0) / percentages.length) : 0;
      const highestScore = Math.max(...percentages);
      const lowestScore = Math.min(...percentages);

      document.getElementById('totalStudents').textContent = uniqueStudents;
      document.getElementById('averageScore').textContent = averageScore + '%';
      document.getElementById('highestScore').textContent = highestScore + '%';
      document.getElementById('lowestScore').textContent = lowestScore + '%';
    }

    // Get display topic name
    function getDisplayTopicName(topic) {
      const topicDisplayNames = {
        'sets_relations': 'Week 1 - Sets and Relations',
        'domain_range_quiz2': 'Week 1 - Domain and Range',
        'linear_functions_2': 'Week 2 - Linear Functions',
        'quadratic_functions': 'Week 3 - Quadratic Functions',
        'polynomials': 'Week 4 - Polynomial Functions',
        'exponential_functions': 'Week 5 - Exponential Functions',
        'logarithmic_functions': 'Week 6 - Logarithmic Functions',
        'sequence_limits': 'Week 7 - Sequence, Limits and Continuity',
        'limits_continuity': 'Week 8 - Limits, Continuity and Differentiation',
        'derivatives_integrals': 'Week 9 - Derivatives and Integrals'
      };
      return topicDisplayNames[topic] || topic || 'Other';
    }

    // Get score class
    function getScoreClass(percentage) {
      if (percentage >= 80) return 'score-excellent';
      if (percentage >= 60) return 'score-good';
      if (percentage >= 40) return 'score-average';
      return 'score-poor';
    }

    // Populate table
    function populateTable(dataToShow = filteredData) {
      const tbody = document.getElementById('tableBody');
      const noDataState = document.getElementById('noDataState');
      const tableContainer = document.getElementById('tableContainer');

      if (dataToShow.length === 0) {
        tableContainer.style.display = 'none';
        noDataState.style.display = 'block';
        tbody.innerHTML = '';
        return;
      }

      tableContainer.style.display = 'block';
      noDataState.style.display = 'none';

      let rowsHTML = '';
      dataToShow.forEach((item, index) => {
        const scoreClass = getScoreClass(item.percentage);
        const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : 'N/A';
        const time = item.timestamp ? new Date(item.timestamp).toLocaleTimeString() : '';
        const hasAnswers = item.questionResults && item.questionResults.length > 0;
        const timeTakenDisplay = formatTimeTaken(item.totalTimeTaken);

        rowsHTML += `
          <tr class="student-row" onclick="toggleStudentDetail(${index})" data-index="${index}>
            <td>${hasAnswers ? `<i class="bi bi-chevron-right expand-icon" id="icon-${index}"></i>` : ''}</td>
            <td><strong>${item.username}</strong></td>
            <td><span class="badge bg-light text-dark">${getDisplayTopicName(item.topic)}</span></td>
            <td><strong>${item.correctAnswers}/${item.totalQuestions}</strong></td>
            <td><span class="score-badge ${scoreClass}">${item.percentage}%</span></td>
            <td><span class="attempt-badge bg-info text-white">#${item.attemptNumber}</span></td>
            <td><span class="time-badge"><i class="bi bi-stopwatch me-1"></i>${timeTakenDisplay}</span></td>
            <td><div>${date}</div>${time ? `<small class="text-muted">${time}</small>` : ''}</td>
          </tr>
        `;

        if (hasAnswers) {
          rowsHTML += `
            <tr id="detail-${index}" style="display: none;">
              <td colspan="8">
                <div class="student-detail p-3">
                  <div id="detail-content-${index}" class="detail-content"></div>
                </div>
              </td>
            </tr>
          `;
        }
      });

      tbody.innerHTML = rowsHTML;
    }

    // Toggle student detail
    function toggleStudentDetail(index) {
      const detailRow = document.getElementById(`detail-${index}`);
      const icon = document.getElementById(`icon-${index}`);
      const contentDiv = document.getElementById(`detail-content-${index}`);

      if (!detailRow || !icon) return;

      if (expandedRows.has(index)) {
        detailRow.style.display = 'none';
        icon.classList.remove('rotated');
        expandedRows.delete(index);
      } else {
        const item = filteredData[index];
        detailRow.style.display = 'table-row';
        icon.classList.add('rotated');
        expandedRows.add(index);
        
        contentDiv.innerHTML = generateStudentDetail(item);
      }
    }

    // Generate student detail
    function generateStudentDetail(item) {
      const results = item.questionResults || [];
      
      if (results.length === 0) {
        return '<p class="text-muted">No detailed answer data available.</p>';
      }

      let detailHtml = `
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0">
            <i class="bi bi-person-badge me-2"></i>${item.username} - Detailed Answer Analysis
            <span class="attempt-badge bg-secondary text-white ms-2">Attempt #${item.attemptNumber}</span>
          </h6>
          <small class="text-muted">
            Score: ${item.correctAnswers}/${item.totalQuestions} (${item.percentage}%)
            ${item.totalTimeTaken ? `&nbsp;|&nbsp;<i class="bi bi-stopwatch"></i> ${formatTimeTaken(item.totalTimeTaken)}` : ''}
          </small>
        </div>
        
        <div class="scrollable-answers">
          <div class="row">
      `;

      results.forEach(result => {
        const isCorrect = result.isCorrect !== undefined ? result.isCorrect : false;
        const timeTaken = result.timeTaken || 0;
        
        detailHtml += `
          <div class="col-md-6 mb-3">
            <div class="question-detail h-100">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h6 class="mb-1">
                  <i class="bi bi-question-circle me-1"></i>Question ${result.questionNumber || 'N/A'}
                </h6>
                <span class="badge ${isCorrect ? 'bg-success' : 'bg-danger'}">
                  ${isCorrect ? '✓ CORRECT' : '✗ INCORRECT'}
                </span>
              </div>
              
              ${result.questionText ? `<div class="mb-2"><small class="text-muted">${result.questionText}</small></div>` : ''}
              
              <div class="mb-2">
                <strong>Correct Answer:</strong> 
                <span class="answer-display">${result.correctAnswer || 'N/A'}</span>
              </div>
              
              <div class="mb-2">
                <strong>Student Answer:</strong> 
                <span class="answer-display ${isCorrect ? 'text-success' : 'text-danger'}">
                  ${result.userAnswer || 'No answer provided'}
                </span>
              </div>
              
              ${result.explanation ? `
                <div class="solution-display">
                  <strong><i class="bi bi-lightbulb me-1"></i>Explanation:</strong>
                  <div class="mt-1">${result.explanation}</div>
                </div>
              ` : ''}
              
              ${timeTaken > 0 ? `
                <div style="font-size: 0.9em; color: #666; margin-top: 0.5rem;">
                  <i class="bi bi-clock me-1"></i>Time spent: ${timeTaken}s
                </div>
              ` : ''}
            </div>
          </div>
        `;
      });

      detailHtml += `
          </div>
        </div>
        
        <div class="mt-3">
          <small class="text-muted">
            <i class="bi bi-info-circle me-1"></i>
            Scroll to view all questions. This is attempt #${item.attemptNumber} for ${item.topic}.
          </small>
        </div>
      `;

      return detailHtml;
    }

    // Populate filter options
    function populateFilters() {
      const topicFilter = document.getElementById('topicFilter');
      const uniqueTopics = new Set();
      
      allData.forEach(item => {
        if (item.topic) uniqueTopics.add(getDisplayTopicName(item.topic));
      });

      topicFilter.innerHTML = '<option value="">All Topics</option>';
      Array.from(uniqueTopics).sort().forEach(topic => {
        topicFilter.innerHTML += `<option value="${topic}">${topic}</option>`;
      });
    }

    // Apply filters
    function applyFilters() {
      const searchTerm = document.getElementById('searchFilter').value.toLowerCase();
      const topicFilter = document.getElementById('topicFilter').value;
      const scoreFilter = document.getElementById('scoreFilter').value;
      const dateFilter = document.getElementById('dateFilter').value;

      filteredData = [...allData];

      if (searchTerm) {
        filteredData = filteredData.filter(item => 
          item.username.toLowerCase().includes(searchTerm)
        );
      }

      if (topicFilter) {
        filteredData = filteredData.filter(item => 
          getDisplayTopicName(item.topic) === topicFilter
        );
      }

      if (scoreFilter) {
        if (scoreFilter === '0') {
          filteredData = filteredData.filter(item => item.percentage === 0);
        } else {
          const [min, max] = scoreFilter.split('-').map(Number);
          filteredData = filteredData.filter(item => item.percentage >= min && item.percentage <= max);
        }
      }

      if (dateFilter) {
        const filterDate = new Date(dateFilter);
        filteredData = filteredData.filter(item => {
          if (!item.timestamp) return false;
          const itemDate = new Date(item.timestamp);
          return itemDate.toDateString() === filterDate.toDateString();
        });
      }

      expandedRows.clear();
      calculateStatistics();
      populateTable(filteredData);
    }

    // Clear filters
    function clearFilters() {
      document.getElementById('searchFilter').value = '';
      document.getElementById('topicFilter').value = '';
      document.getElementById('scoreFilter').value = '';
      document.getElementById('dateFilter').value = '';
      
      expandedRows.clear();
      filteredData = [...allData];
      calculateStatistics();
      populateTable(filteredData);
    }

    // Export data
    function exportData() {
      const headers = ['Username', 'Topic', 'Score', 'Total Questions', 'Percentage', 'Attempt Number', 'Time Taken', 'Date'];
      let csv = headers.join(',') + '\n';
      
      filteredData.forEach(item => {
        const date = item.timestamp ? new Date(item.timestamp).toLocaleDateString() : 'N/A';
        csv += [
          `"${item.username}"`,
          `"${getDisplayTopicName(item.topic)}"`,
          `${item.correctAnswers}`,
          `${item.totalQuestions}`,
          `${item.percentage}%`,
          `${item.attemptNumber}`,
          `"${formatTimeTaken(item.totalTimeTaken)}"`,
          `"${date}"`
        ].join(',') + '\n';
      });
      
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', `iitm_math1_results_${new Date().toISOString().split('T')[0]}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Refresh data
    async function refreshData() {
      currentPage = 1;
      await loadData(currentPage);
    }

    // Show table
    function showTable() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('tableContainer').style.display = 'block';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
